name: CD

on:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: self-hosted  # GitHub Actions runner installed on the Droplet
    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart
        run: |
          IMAGE="${{ github.event.client_payload.image }}"
          TAG="${{ github.event.client_payload.tag }}"

          docker pull ${IMAGE}:${TAG}
          docker stop betting-api || true
          docker rm betting-api || true
          docker run -d \
            --name betting-api \
            --restart unless-stopped \
            -p 8000:8000 \
            -e APP_VERSION=${TAG} \
            -e IMAGE_TAG=${TAG} \
            ${IMAGE}:${TAG}
